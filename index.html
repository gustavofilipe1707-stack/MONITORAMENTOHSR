<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSR SPECIALIST - MONITOR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Paleta Leve baseada no parâmetro enviado */
            --primary-gray: #999999;
            --bg-body: #ffffff;
            --header-bg: #b3b3b3;
            --row-even: #f2f2f2;
            --row-odd: #ffffff;
            --border: #cccccc;
            --text-main: #333333;
            --text-dim: #666666;
            --success: #dff0d8; /* Verde claro para Disponível */
            --success-text: #3c763d;
            --calling: #fcf8e3; /* Amarelo claro para Atendimento */
            --calling-text: #8a6d3b;
            --pause: #f2dede; /* Vermelho claro para Ocorrência/Pausa */
            --pause-text: #a94442;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 15px;
        }

        /* --- LOGIN OVERLAY --- */
        #selector-overlay {
            position: fixed;
            inset: 0;
            background: #fff;
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: #fff;
            padding: 40px;
            border-radius: 8px;
            border: 1px solid var(--border);
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 350px;
        }

        .btn-entry {
            padding: 10px;
            width: 100%;
            border-radius: 4px;
            border: 1px solid var(--border);
            background: #eee;
            color: #333;
            cursor: pointer;
            font-weight: 700;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        /* --- HEADER & STATS --- */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--header-bg);
        }

        .brand h1 { font-size: 18px; margin: 0; color: var(--text-main); }
        .stat-group { display: flex; gap: 10px; align-items: center; }
        .stat-card { padding: 5px 15px; border-radius: 4px; background: #eee; border: 1px solid var(--border); font-size: 12px; }
        .stat-val { font-weight: 800; color: #000; }

        .search-box {
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 4px;
            width: 200px;
        }

        /* --- TABLE STYLE (BASEADO NA IMAGEM) --- */
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        
        thead th {
            background: var(--primary-gray);
            color: white;
            padding: 8px;
            text-align: left;
            border: 1px solid #fff;
        }

        .fila-section td {
            background: var(--header-bg);
            color: #fff;
            font-weight: 800;
            padding: 5px 10px;
            border: 1px solid #fff;
        }

        .fila-bar { display: flex; justify-content: space-between; align-items: center; }

        .row-agent td {
            padding: 6px 10px;
            border: 1px solid var(--border);
        }

        .row-agent:nth-child(even) { background: var(--row-even); }
        .row-agent:nth-child(odd) { background: var(--row-odd); }

        /* --- STATUS COLORS --- */
        .status-cell { font-weight: 600; text-align: center; }
        .available { background-color: var(--success); color: var(--success-text); }
        .busy { background-color: var(--calling); color: var(--calling-text); }
        .paused { background-color: var(--pause); color: var(--pause-text); }

        .btn-ctrl {
            background: #fff;
            border: 1px solid var(--border);
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 3px;
        }
    </style>
</head>

<body>

    <div id="selector-overlay">
        <div class="login-box">
            <img src="https://hsr.com.br/wp-content/uploads/2022/10/logo-hsr-specialist-researchers.png" style="width: 140px; margin-bottom: 25px;">
            <div id="step-1">
                <button class="btn-entry" onclick="entrar('INTERVIEW')">Acesso Interview</button>
                <button class="btn-entry" onclick="entrar('DMG')">Acesso DMG</button>
                <button class="btn-entry" style="background:#b3b3b3;" onclick="irParaSenha()">👑 FULL COMMAND (HSR)</button>
            </div>
            <div id="step-2" style="display:none">
                <input type="password" id="hsr-pass" class="search-box" style="width:100%; margin-bottom:15px; text-align:center" placeholder="SENHA">
                <button class="btn-entry" style="background:#333; color:#fff" onclick="validar()">ACESSAR</button>
            </div>
        </div>
    </div>

    <div id="main-panel" style="display:none">
        <div class="top-bar">
            <div class="brand">
                <h1>HSR MONITOR - <span id="label-empresa"></span></h1>
            </div>
            <div class="stat-group">
                <div class="stat-card">Agentes: <span id="count-total" class="stat-val">0</span></div>
                <div class="stat-card">Falando: <span id="count-calls" class="stat-val">0</span></div>
                <input type="text" id="filtro" class="search-box" placeholder="Filtrar..." oninput="renderizarTabela()">
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Agente</th>
                    <th>Ramal</th>
                    <th>Duração</th>
                    <th>Falando com</th>
                    <th>Fila</th>
                    <th>Status</th>
                    <th style="text-align:right">Ações</th>
                </tr>
            </thead>
            <tbody id="tabela-corpo"></tbody>
        </table>
    </div>

    <script>
        let selectedEmpresa = "";
        const filaMemory = {};
        const timers = {};
        let dadosGlobais = [];
        let chamadasAtivas = [];

        function getFilaFixa(ramal) {
            const r = String(ramal);
            const mapa = {
                '16628': 'BRK_SUL',
                '16629': 'BRK_SUL',
                '16630': 'POLITICA_SP',
                '16631': 'POLITICA_SP',
                '16650': 'SANEAMENTO_GO',
            };
            return mapa[r] || filaMemory[r] || "OUTROS";
        }

        async function sincronizar() {
            if (!selectedEmpresa) return;
            try {
                const [resStatus, resCalls] = await Promise.all([
                    fetch(`https://fastdialer.fastquest.net/app/extensions/extensions_status_api.php`),
                    fetch(`https://fastdialer.fastquest.net/app/extensions/active_calls_api.php`)
                ]);
                const dataStatus = await resStatus.json();
                const dataCalls = await resCalls.json();
                
                // --- FILTRO DE UNICIDADE (CALL ID ÚNICO) ---
                const rawCalls = dataCalls.calls || [];
                const uniqueIds = new Set();
                chamadasAtivas = rawCalls.filter(call => {
                    if (!call.call_id || uniqueIds.has(call.call_id)) return false;
                    uniqueIds.add(call.call_id);
                    return true;
                });

                if (dataStatus.success) {
                    dadosGlobais = dataStatus.extensions.map(ext => {
                        const ramal = ext.extension;
                        const call = chamadasAtivas.find(c => String(c.extension) === String(ramal));

                        if (call && call.caller_name && !call.caller_name.toUpperCase().includes("OUTBOUND")) {
                            const match = call.caller_name.toUpperCase().match(/^[A-Z0-9_]+/);
                            if (match) filaMemory[ramal] = match[0];
                        }

                        return {
                            ramal, dominio: ext.domain, call_id: call?.call_id,
                            nome: ext.agent_info?.agent_name?.split('_')[0] || "AGENTE",
                            empresa: ext.agent_info?.agent_name?.split('_').pop().toUpperCase() || "HSR",
                            status: ext.agent_info?.agent_status || "OFFLINE",
                            chamada: call,
                            fila: getFilaFixa(ramal)
                        };
                    });
                    renderizarTabela();
                }
            } catch (e) { console.error("Sync Error:", e); }
        }

        function renderizarTabela() {
            const corpo = document.getElementById('tabela-corpo');
            const busca = document.getElementById('filtro').value.toUpperCase();
            const agora = Math.floor(Date.now() / 1000);
            corpo.innerHTML = "";

            let filtrados = selectedEmpresa === "HSR" ? dadosGlobais : dadosGlobais.filter(d => d.empresa === selectedEmpresa);
            document.getElementById('count-total').innerText = filtrados.length;
            document.getElementById('count-calls').innerText = filtrados.filter(f => f.chamada).length;

            const grupos = filtrados.reduce((acc, obj) => { (acc[obj.fila] = acc[obj.fila] || []).push(obj); return acc; }, {});

            Object.keys(grupos).sort().forEach(nomeFila => {
                let agentesHtml = "";
                let hasVisible = false;

                // Contagem de discagem filtrada por Call ID único
                const emDiscagem = chamadasAtivas.filter(c => c.caller_name?.toUpperCase().includes(nomeFila) && !c.extension).length;

                grupos[nomeFila].forEach(item => {
                    if (busca && !item.fila.includes(busca) && !item.nome.toUpperCase().includes(busca) && !item.ramal.includes(busca)) return;
                    hasVisible = true;

                    let sClass = "paused", sText = item.status;
                    if (item.chamada) { sClass = "busy"; sText = "Em Atendimento"; }
                    else if (item.status === "Available") { sClass = "available"; sText = "Disponível"; }
                    if (sText.includes("PAUSE") || sText.includes("Tabulação")) sClass = "paused";

                    if (!timers[item.ramal] || timers[item.ramal].status !== sText) timers[item.ramal] = { status: sText, start: agora };
                    const diff = agora - timers[item.ramal].start;
                    const tempoStr = `${Math.floor(diff / 60)}m ${diff % 60}s`;

                    agentesHtml += `
                        <tr class="row-agent">
                            <td><b>${item.nome}</b></td>
                            <td>${item.ramal}</td>
                            <td>${tempoStr}</td>
                            <td>${item.chamada?.phone_number || "-"}</td>
                            <td>${item.fila}</td>
                            <td class="status-cell ${sClass}">${sText}</td>
                            <td style="text-align:right">
                                <button class="btn-ctrl" onclick="derrubar('${item.call_id}')" ${!item.call_id ? 'disabled' : ''}><i class="bi bi-telephone-x"></i></button>
                            </td>
                        </tr>`;
                });

                if (hasVisible) {
                    corpo.innerHTML += `
                        <tr class="fila-section"><td colspan="7">
                            <div class="fila-bar">
                                <div>${nomeFila} (${grupos[nomeFila].length})</div>
                                <div class="dialing-box">DISCANDO: ${emDiscagem}</div>
                            </div>
                        </td></tr>`;
                    corpo.innerHTML += agentesHtml;
                }
            });
        }

        function entrar(emp) { selectedEmpresa = emp; document.getElementById('selector-overlay').style.display = 'none'; document.getElementById('main-panel').style.display = 'block'; document.getElementById('label-empresa').innerText = emp; setInterval(sincronizar, 1500); }
        function irParaSenha() { document.getElementById('step-1').style.display = 'none'; document.getElementById('step-2').style.display = 'block'; }
        function validar() { if (document.getElementById('hsr-pass').value === "hsr") entrar('HSR'); else alert("Incorreto"); }
        async function derrubar(id) { 
            if (id && confirm("Derrubar chamada?")) {
                await fetch(`https://fastdialer.fastquest.net/app/extensions/active_calls_api.php?call_id=${id}`, { method: 'DELETE' });
            }
        }
    </script>
</body>
</html>
