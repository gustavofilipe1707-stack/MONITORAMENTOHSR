<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSR SPECIALIST - COMMAND CENTER</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono:wght@500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #00d4ff;
            --bg-body: #050a12;
            --card-bg: rgba(13, 20, 33, 0.95);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #e2e8f0;
            --text-dim: #94a3b8;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --calling: #3b82f6;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 25px;
            background-image: radial-gradient(circle at 50% 0%, #101d33 0%, #050a12 70%);
            min-height: 100vh;
        }

        /* --- LOGIN OVERLAY --- */
        #selector-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-body);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(15px);
        }

        .login-box {
            background: var(--card-bg);
            padding: 50px;
            border-radius: 30px;
            border: 1px solid var(--border);
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 380px;
        }

        .btn-entry {
            padding: 14px;
            width: 100%;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.03);
            color: white;
            cursor: pointer;
            font-weight: 700;
            margin-bottom: 12px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-entry:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
            border-color: transparent;
        }

        /* --- HEADER --- */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            gap: 20px;
        }

        .brand h1 {
            font-family: 'Orbitron';
            font-size: 22px;
            margin: 0;
            letter-spacing: 2px;
            color: var(--primary);
            text-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        }

        .stat-group {
            display: flex;
            gap: 15px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 15px 25px;
            border-radius: 18px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 120px;
        }

        .stat-val {
            font-family: 'Orbitron';
            font-size: 24px;
            color: var(--primary);
        }

        .stat-label {
            font-size: 10px;
            text-transform: uppercase;
            color: var(--text-dim);
            letter-spacing: 1px;
            margin-top: 5px;
        }

        /* --- SEARCH --- */
        .search-wrapper {
            position: relative;
        }

        .search-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            padding: 12px 20px 12px 45px;
            border-radius: 14px;
            color: white;
            width: 300px;
            transition: 0.3s;
            font-size: 14px;
        }

        .search-box:focus {
            width: 400px;
            border-color: var(--primary);
            outline: none;
            background: rgba(255, 255, 255, 0.08);
        }

        .search-wrapper i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
        }

        /* --- TABLE --- */
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
        }

        thead th {
            padding: 15px 20px;
            color: var(--text-dim);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
        }

        .row-agent {
            background: var(--card-bg);
            border-radius: 15px;
            transition: 0.2s;
        }

        .row-agent:hover {
            transform: scale(1.002);
            background: rgba(255, 255, 255, 0.03);
        }

        td {
            padding: 18px 20px;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }

        td:first-child {
            border-left: 1px solid var(--border);
            border-radius: 15px 0 0 15px;
        }

        td:last-child {
            border-right: 1px solid var(--border);
            border-radius: 0 15px 15px 0;
        }

        /* --- BADGES --- */
        .badge-status {
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .bg-available {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .bg-calling {
            background: rgba(59, 130, 246, 0.15);
            color: var(--calling);
            border: 1px solid rgba(59, 130, 246, 0.2);
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.2);
        }

        .bg-pause {
            background: rgba(245, 158, 11, 0.15);
            color: var(--warning);
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .timer {
            font-family: 'JetBrains Mono';
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 5px;
            display: block;
        }

        /* --- FILA DIVIDER --- */
        .fila-section td {
            border: none;
            padding: 50px 0 15px 5px;
            background: transparent;
        }

        .fila-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-left: 4px solid var(--primary);
            padding: 0 20px;
        }

        .fila-name {
            font-family: 'Orbitron';
            font-size: 16px;
            letter-spacing: 2px;
            color: white;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .fila-name span {
            color: var(--text-dim);
            font-size: 12px;
            font-family: 'Plus Jakarta Sans';
            font-weight: 400;
        }

        .dialing-box {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid var(--primary);
            padding: 8px 18px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-ctrl {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text-dim);
            width: 35px;
            height: 35px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-ctrl:hover {
            color: var(--danger);
            border-color: var(--danger);
            background: rgba(239, 68, 68, 0.1);
        }
    </style>
</head>

<body>

    <div id="selector-overlay">
        <div class="login-box">
            <img src="https://hsr.com.br/wp-content/uploads/2022/10/logo-hsr-specialist-researchers.png"
                style="width: 150px; margin-bottom: 30px; filter: brightness(0) invert(1);">
            <div id="step-1">
                <button class="btn-entry" onclick="entrar('INTERVIEW')">Acesso Interview</button>
                <button class="btn-entry" onclick="entrar('DMG')">Acesso DMG</button>
                <button class="btn-entry" style="color:var(--primary); border-color: var(--primary)"
                    onclick="irParaSenha()">👑 FULL COMMAND (HSR)</button>
            </div>
            <div id="step-2" style="display:none">
                <input type="password" id="hsr-pass" class="search-box"
                    style="width:100%; margin-bottom:15px; text-align:center" placeholder="INSIRA A SENHA">
                <button class="btn-entry" style="background:var(--primary); color:#000" onclick="validar()">ENTRAR NO
                    SISTEMA</button>
            </div>
        </div>
    </div>

    <div id="main-panel" style="display:none">
        <div class="top-bar">
            <div class="brand">
                <h1>HSR SPECIALIST <span id="label-empresa"
                        style="font-weight:300; color:white; margin-left:10px"></span></h1>
                <p
                    style="margin:5px 0 0; font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px">
                    <i class="bi bi-broadcast"></i> Central de Monitoramento em Tempo Real</p>
            </div>

            <div class="stat-group">
                <div class="stat-card">
                    <div id="count-total" class="stat-val">0</div>
                    <div class="stat-label">Agentes</div>
                </div>
                <div class="stat-card" style="border-color: var(--calling)">
                    <div id="count-calls" class="stat-val" style="color: var(--calling)">0</div>
                    <div class="stat-label">Em Linha</div>
                </div>
                <div class="search-wrapper" style="margin-left:20px">
                    <i class="bi bi-search"></i>
                    <input type="text" id="filtro" class="search-box" placeholder="Buscar por agente, ramal ou fila..."
                        oninput="renderizarTabela()">
                </div>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Ramal</th>
                    <th>Operador</th>
                    <th>Status Atual</th>
                    <th>Destino</th>
                    <th>Projeto / Fila</th>
                    <th style="text-align:right">Ações</th>
                </tr>
            </thead>
            <tbody id="tabela-corpo"></tbody>
        </table>
    </div>

    <script>
        let selectedEmpresa = "";
        const filaMemory = {};
        const timers = {};
        let dadosGlobais = [];
        let chamadasAtivas = [];

        // ==========================================
        // 🛠️ CADASTRO FIXO DE RAMAIS (MAPEAMENTO)
        // ==========================================
        function getFilaFixa(ramal) {
            const r = String(ramal);
            const mapa = {
                '16628': 'BRK_SUL',
                '16629': 'BRK_SUL',
                '16630': 'POLITICA_SP',
                '16631': 'POLITICA_SP',
                '16650': 'SANEAMENTO_GO',
                // Adicione seus ramais aqui...
            };
            return mapa[r] || filaMemory[r] || "PROJETO_PENDENTE";
        }

        async function sincronizar() {
            if (!selectedEmpresa) return;
            try {
                const [resStatus, resCalls] = await Promise.all([
                    fetch(`https://fastdialer.fastquest.net/app/extensions/extensions_status_api.php`),
                    fetch(`https://fastdialer.fastquest.net/app/extensions/active_calls_api.php`)
                ]);
                const dataStatus = await resStatus.json();
                const dataCalls = await resCalls.json();
                chamadasAtivas = dataCalls.calls || [];

                if (dataStatus.success) {
                    dadosGlobais = dataStatus.extensions.map(ext => {
                        const ramal = ext.extension;
                        const call = chamadasAtivas.find(c => String(c.extension) === String(ramal));

                        // Aprende a fila se ver uma chamada real
                        if (call && call.caller_name) {
                            const cName = call.caller_name.toUpperCase();
                            if (!cName.includes("OUTBOUND") && !cName.includes("REDISCAGEM")) {
                                const match = cName.match(/^[A-Z0-9_]+/);
                                if (match) filaMemory[ramal] = match[0];
                            }
                        }

                        return {
                            ramal,
                            dominio: ext.domain,
                            call_id: call?.call_id,
                            nome: ext.agent_info?.agent_name?.split('_')[0] || "OPERADOR",
                            empresa: ext.agent_info?.agent_name?.split('_').pop().toUpperCase() || "HSR",
                            status: ext.agent_info?.agent_status || "OFFLINE",
                            chamada: call,
                            fila: getFilaFixa(ramal)
                        };
                    });
                    renderizarTabela();
                }
            } catch (e) { console.error("Sync Error:", e); }
        }

        function renderizarTabela() {
            const corpo = document.getElementById('tabela-corpo');
            const busca = document.getElementById('filtro').value.toUpperCase();
            const agora = Math.floor(Date.now() / 1000);
            corpo.innerHTML = "";

            let filtrados = selectedEmpresa === "HSR" ? dadosGlobais : dadosGlobais.filter(d => d.empresa === selectedEmpresa);

            // Atualiza contadores do topo
            document.getElementById('count-total').innerText = filtrados.length;
            document.getElementById('count-calls').innerText = filtrados.filter(f => f.chamada).length;

            // Agrupamento
            const grupos = filtrados.reduce((acc, obj) => { (acc[obj.fila] = acc[obj.fila] || []).push(obj); return acc; }, {});

            Object.keys(grupos).sort().forEach(nomeFila => {
                let agentesHtml = "";
                let hasVisible = false;

                const emDiscagem = chamadasAtivas.filter(c => c.caller_name?.toUpperCase().includes(nomeFila) && !c.extension).length;

                grupos[nomeFila].forEach(item => {
                    if (busca && !item.fila.includes(busca) && !item.nome.toUpperCase().includes(busca) && !item.ramal.includes(busca)) return;
                    hasVisible = true;

                    let sClass = "bg-pause", sText = item.status;
                    if (item.chamada) { sClass = "bg-calling"; sText = "Em Linha"; }
                    else if (item.status === "Available") { sClass = "bg-available"; sText = "Livre"; }

                    // Timer logic
                    if (!timers[item.ramal] || timers[item.ramal].status !== sText) timers[item.ramal] = { status: sText, start: agora };
                    const diff = agora - timers[item.ramal].start;
                    const tempoStr = `${Math.floor(diff / 60)}m ${diff % 60}s`;

                    agentesHtml += `
                        <tr class="row-agent">
                            <td style="font-family:'JetBrains Mono'">${item.ramal}</td>
                            <td><b style="font-size:15px">${item.nome}</b></td>
                            <td>
                                <span class="badge-status ${sClass}"><i class="bi bi-record-fill"></i> ${sText}</span>
                                <span class="timer">${tempoStr}</span>
                            </td>
                            <td style="font-family:'JetBrains Mono'; color:var(--primary)">${item.chamada?.phone_number || "---"}</td>
                            <td><span style="font-size:12px; font-weight:700; opacity:0.8">${item.fila}</span></td>
                            <td style="text-align:right">
                                <button class="btn-ctrl" onclick="alert('Ramal ${item.ramal}')"><i class="bi bi-info-circle"></i></button>
                                ${item.call_id ? `<button class="btn-ctrl" onclick="derrubar('${item.call_id}')" style="margin-left:5px"><i class="bi bi-telephone-x"></i></button>` : ''}
                            </td>
                        </tr>`;
                });

                if (hasVisible) {
                    corpo.innerHTML += `
                        <tr class="fila-section"><td colspan="6">
                            <div class="fila-bar">
                                <div class="fila-name"><i class="bi bi-hdd-stack-fill" style="color:var(--primary)"></i> ${nomeFila} <span>/ ${grupos[nomeFila].length} Agentes</span></div>
                                <div class="dialing-box">
                                    <div style="width:8px; height:8px; background:var(--primary); border-radius:50%; animation: pulse 1s infinite"></div>
                                    DISCANDO: ${emDiscagem}
                                </div>
                            </div>
                        </td></tr>`;
                    corpo.innerHTML += agentesHtml;
                }
            });
        }

        // --- FUNÇÕES DE NAVEGAÇÃO ---
        function entrar(emp) { selectedEmpresa = emp; document.getElementById('selector-overlay').style.display = 'none'; document.getElementById('main-panel').style.display = 'block'; document.getElementById('label-empresa').innerText = emp; setInterval(sincronizar, 1500); }
        function irParaSenha() { document.getElementById('step-1').style.display = 'none'; document.getElementById('step-2').style.display = 'block'; }
        function validar() { if (document.getElementById('hsr-pass').value === "hsr") entrar('HSR'); else alert("Incorreto"); }
        async function derrubar(id) { if (confirm("Derrubar chamada?")) await fetch('https://fastdialer.fastquest.net/app/extensions/active_calls_api.php', { method: 'DELETE', body: JSON.stringify({ call_id: id }) }); }
    </script>
</body>

</html>
