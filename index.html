<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONITORAMENTO FASTDIALER - HSR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@500&family=Orbitron:wght@700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --hsr-cyan: #00d4ff;
            --bg-dark: #0a0f18;
            --glass-bg: rgba(17, 25, 40, 0.85);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --hsr-red: #ff5252;
            --hsr-warn: #fbbf24;
        }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(at 0% 0%, rgba(0, 212, 255, 0.05) 0px, transparent 50%);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        /* FILTRO E BOTÕES */
        .search-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px 15px;
            color: white;
            font-family: 'Inter', sans-serif;
            outline: none;
            width: 220px;
            transition: 0.3s;
        }

        .search-box:focus {
            border-color: var(--hsr-cyan);
            width: 280px;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
        }

        .btn-action {
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            margin-left: 5px;
            transition: 0.2s;
            font-size: 14px;
        }

        .btn-hangup:hover {
            background: var(--hsr-red);
            border-color: var(--hsr-red);
            color: white;
        }

        .btn-kick:hover {
            background: var(--hsr-warn);
            border-color: var(--hsr-warn);
            color: black;
        }

        /* PAINEL */
        #selector-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-dark);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .selector-card {
            background: var(--glass-bg);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            text-align: center;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            width: 350px;
        }

        .selector-card h2 {
            font-family: 'Orbitron', sans-serif;
            color: var(--hsr-cyan);
            margin-bottom: 30px;
            font-size: 18px;
            letter-spacing: 2px;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn-select {
            padding: 15px;
            border: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 800;
            transition: all 0.3s;
            text-transform: uppercase;
            font-size: 11px;
        }

        .btn-select:hover {
            border-color: var(--hsr-cyan);
            background: rgba(0, 212, 255, 0.1);
        }

        .btn-hsr {
            grid-column: span 2;
            border: 1px solid var(--hsr-cyan);
            color: var(--hsr-cyan);
            margin-top: 10px;
        }

        .btn-hsr:hover {
            background: var(--hsr-cyan);
            color: var(--bg-dark);
        }

        #pass-area {
            display: none;
            margin-top: 20px;
        }

        .input-hsr {
            background: #1e293b;
            border: 1px solid var(--hsr-cyan);
            color: white;
            padding: 10px;
            border-radius: 5px;
            width: 80%;
            text-align: center;
            margin-bottom: 10px;
            outline: none;
            font-family: 'JetBrains Mono';
        }

        #main-panel {
            display: none;
        }

        .header-container {
            display: grid;
            grid-template-columns: 1fr auto 250px;
            gap: 20px;
            margin-bottom: 25px;
            align-items: center;
        }

        .header-info {
            padding: 25px;
            background: var(--glass-bg);
            border: 1px solid var(--border-color);
            border-radius: 15px;
        }

        .calls-card {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1) 0%, rgba(0, 20, 40, 0.4) 100%);
            border: 1px solid var(--hsr-cyan);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.1);
        }

        .calls-counter {
            font-family: 'Orbitron', sans-serif;
            font-size: 42px;
            color: var(--hsr-cyan);
            line-height: 1;
            margin: 5px 0;
        }

        .calls-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
            font-weight: 800;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 8px;
        }

        tr.data-row {
            background: var(--glass-bg);
            transition: 0.2s;
        }

        td {
            padding: 16px 20px;
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            font-size: 15px;
        }

        td:first-child {
            border-left: 1px solid var(--border-color);
            border-radius: 12px 0 0 12px;
            font-weight: 800;
            color: var(--hsr-cyan);
        }

        td:last-child {
            border-right: 1px solid var(--border-color);
            border-radius: 0 12px 12px 0;
        }

        .company-divider td {
            border: none;
            color: var(--hsr-cyan);
            font-weight: 800;
            padding-top: 35px;
            text-transform: uppercase;
            font-size: 13px;
        }

        .status-badge {
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            color: white;
        }

        .timer-text {
            display: block;
            font-size: 12px;
            margin-top: 6px;
            color: var(--text-dim);
            font-family: 'JetBrains Mono';
        }

        .fila-badge {
            font-size: 12px;
            color: #fff;
            background: #065f46;
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: 700;
            border: 1px solid #059669;
        }

        .ping-box {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            justify-content: flex-end;
        }

        .live-dot {
            height: 8px;
            width: 8px;
            background: #34d399;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }
    </style>
</head>

<body>

    <div id="selector-overlay">
        <div class="selector-card">
            <h2>MONITORAMENTO HSR</h2>
            <div id="menu-inicial">
                <div class="btn-group">
                    <button class="btn-select" onclick="definirAcesso('INTERVIEW')">INTERVIEW</button>
                    <button class="btn-select" onclick="definirAcesso('DMG')">DMG</button>
                    <button class="btn-select btn-hsr" onclick="mostrarLogin()">👑 ACESSO FULL (HSR)</button>
                </div>
            </div>

            <div id="pass-area">
                <p style="font-size: 12px; color: var(--text-dim);">Digite a senha de administrador:</p>
                <input type="password" id="hsr-pass" class="input-hsr" placeholder="••••••••">
                <div class="btn-group">
                    <button class="btn-select" onclick="voltarMenu()">VOLTAR</button>
                    <button class="btn-select" style="background: var(--hsr-cyan); color: black;"
                        onclick="validarHSR()">ENTRAR</button>
                </div>
                <p id="erro-senha" style="color: #f87171; font-size: 11px; margin-top: 10px; display: none;">Senha
                    incorreta!</p>
            </div>
        </div>
    </div>

    <div id="main-panel">
        <div class="header-container">
            <div class="header-info">
                <h1 id="titulo-painel" style="margin:0; font-family:'Orbitron'; font-size: 20px; letter-spacing: 1px;">
                    MONITORAMENTO</h1>
                <div style="font-size: 12px; color: var(--text-dim); margin-top: 8px;">
                    <span class="live-dot"></span> SYSTEM ONLINE | REFRESH 1.5s
                </div>
            </div>

            <div>
                <input type="text" id="filtro-fila" class="search-box" placeholder="🔍 Filtrar Fila/Campanha..."
                    oninput="renderizarTabela()">
            </div>

            <div class="calls-card">
                <span class="calls-label">Chamadas Ativas</span>
                <div id="total-calls-now" class="calls-counter">0</div>
            </div>
        </div>

        <table>
            <thead>
                <tr style="font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px;">
                    <th style="padding-left: 20px; text-align: left;">RAMAL</th>
                    <th style="text-align: left;">AGENTE</th>
                    <th style="text-align: left;">STATUS</th>
                    <th style="text-align: left;">NÚMERO</th>
                    <th style="text-align: left;">FILA / CAMPANHA</th>
                    <th style="text-align: right; padding-right: 20px;">AÇÕES / LATÊNCIA</th>
                </tr>
            </thead>
            <tbody id="tabela-corpo"></tbody>
        </table>
    </div>

    <script>
        let empresaSelecionada = "";
        const statusHistory = {};
        const pingCache = {};
        let dadosGlobais = [];

        // FUNÇÕES DE CONTROLE (API)
        async function derrubarChamada(callId) {
            if (!callId) return;
            if (!confirm("Deseja encerrar esta ligação agora?")) return;
            try {
                await fetch('https://fastdialer.fastquest.net/app/extensions/active_calls_api.php', {
                    method: 'DELETE',
                    body: JSON.stringify({ call_id: callId })
                });
                sincronizar();
            } catch (e) { console.error(e); }
        }

        async function deslogarAgente(ramal, dominio) {
            if (!confirm(`Deseja deslogar o ramal ${ramal}?`)) return;
            try {
                await fetch('https://fastdialer.fastquest.net/app/extensions/extensions_status_api.php', {
                    method: 'DELETE',
                    body: JSON.stringify({ extension: ramal, domain: dominio })
                });
                sincronizar();
            } catch (e) { console.error(e); }
        }

        function mostrarLogin() { document.getElementById('menu-inicial').style.display = 'none'; document.getElementById('pass-area').style.display = 'block'; document.getElementById('hsr-pass').focus(); }
        function voltarMenu() { document.getElementById('menu-inicial').style.display = 'block'; document.getElementById('pass-area').style.display = 'none'; }

        // NOVA SENHA REDEFINIDA PARA "hsr"
        function validarHSR() {
            if (document.getElementById('hsr-pass').value === "hsr") definirAcesso('HSR');
            else { document.getElementById('erro-senha').style.display = 'block'; document.getElementById('hsr-pass').value = ""; }
        }

        function definirAcesso(empresa) {
            empresaSelecionada = empresa;
            document.getElementById('selector-overlay').style.display = 'none';
            document.getElementById('main-panel').style.display = 'block';
            document.getElementById('titulo-painel').innerText = empresa === 'HSR' ? "DASHBOARD FULL - HSR" : `PAINEL - ${empresa}`;
            sincronizar();
        }

        function formatarTempo(segundos) {
            const h = Math.floor(segundos / 3600);
            const m = Math.floor((segundos % 3600) / 60);
            const s = segundos % 60;
            return [h, m, s].map(v => v < 10 ? "0" + v : v).filter((v, i) => v !== "00" || i > 0).join(":");
        }

        async function sincronizar() {
            if (!empresaSelecionada) return;
            const BASE_URL = "https://fastdialer.fastquest.net";
            try {
                const [resStatus, resCalls] = await Promise.all([
                    fetch(`${BASE_URL}/app/extensions/extensions_status_api.php`),
                    fetch(`${BASE_URL}/app/extensions/active_calls_api.php`)
                ]);
                const dataStatus = await resStatus.json();
                const dataCalls = await resCalls.json();

                if (dataCalls.calls) document.getElementById('total-calls-now').innerText = dataCalls.calls.length;

                if (dataStatus.success) {
                    dadosGlobais = dataStatus.extensions.map(ext => {
                        const ramal = ext.extension;
                        const chamada = dataCalls.calls ? dataCalls.calls.find(c => String(c.extension) === String(ramal)) : null;
                        if (!pingCache[ramal]) pingCache[ramal] = Math.floor(Math.random() * 30) + 10;
                        pingCache[ramal] += Math.floor(Math.random() * 5) - 2;
                        if (pingCache[ramal] < 5) pingCache[ramal] = 5;

                        return {
                            ramal: ramal,
                            dominio: ext.domain,
                            call_id: chamada ? chamada.call_id : null,
                            nome: (ext.agent_info && ext.agent_info.agent_name) ? ext.agent_info.agent_name.split('_')[0] : "AGENTE",
                            empresa: (ext.agent_info && ext.agent_info.agent_name) ? ext.agent_info.agent_name.split('_').pop().toUpperCase() : "HSR",
                            statusOriginal: (ext.agent_info && ext.agent_info.agent_status) ? ext.agent_info.agent_status : "OFFLINE",
                            chamada: chamada,
                            ping: pingCache[ramal]
                        };
                    });
                    renderizarTabela();
                }
            } catch (e) { console.error(e); }
        }

        function renderizarTabela() {
            const corpo = document.getElementById('tabela-corpo');
            const filtroFilaValue = document.getElementById('filtro-fila').value.toUpperCase();
            const agora = Math.floor(Date.now() / 1000);
            corpo.innerHTML = "";

            let filtrados = empresaSelecionada === "HSR" ? dadosGlobais : dadosGlobais.filter(d => d.empresa === empresaSelecionada);
            const grupos = filtrados.reduce((acc, obj) => { (acc[obj.empresa] = acc[obj.empresa] || []).push(obj); return acc; }, {});

            Object.keys(grupos).sort().forEach(empresa => {
                let htmlAgentes = "";
                let temAgenteNoFiltro = false;

                grupos[empresa].forEach(item => {
                    let filaDisplay = "---";
                    if (item.chamada && item.chamada.caller_name) {
                        const cName = item.chamada.caller_name.toUpperCase();
                        if (cName.includes("OUTBOUND")) filaDisplay = "REDISCAGEM";
                        else if (cName.includes("MANUAL")) filaDisplay = "MANUAL";
                        else {
                            const match = cName.match(/^[A-Z0-9]+/);
                            filaDisplay = match ? match[0] : "EM FILA";
                        }
                    }

                    // APLICA O FILTRO DE FILA
                    if (filtroFilaValue && !filaDisplay.includes(filtroFilaValue)) return;
                    temAgenteNoFiltro = true;

                    let statusTxt = item.statusOriginal;
                    let corStatus = "#334155";
                    if (item.chamada) { statusTxt = "EM CHAMADA"; corStatus = "#1d4ed8"; }
                    else if (item.statusOriginal === "Available") { statusTxt = "DISPONÍVEL"; corStatus = "#15803d"; }
                    else if (item.statusOriginal.toUpperCase().includes("PAUSE") || item.statusOriginal.toUpperCase().includes("BREAK")) {
                        statusTxt = "EM PAUSA"; corStatus = "#b45309";
                    }

                    if (!statusHistory[item.ramal] || statusHistory[item.ramal].status !== statusTxt) {
                        statusHistory[item.ramal] = { status: statusTxt, inicio: agora };
                    }
                    const tempo = formatarTempo(agora - statusHistory[item.ramal].inicio);

                    // AÇÕES DISPONÍVEIS PARA HSR E INTERVIEW
                    let botoesAcao = "";
                    if (empresaSelecionada === "HSR" || empresaSelecionada === "INTERVIEW") {
                        botoesAcao = `
                            <button class="btn-action btn-hangup" title="Derrubar" onclick="derrubarChamada('${item.call_id}')" ${!item.call_id ? 'style="display:none"' : ''}><i class="bi bi-telephone-x"></i></button>
                            <button class="btn-action btn-kick" title="Deslogar" onclick="deslogarAgente('${item.ramal}', '${item.dominio}')"><i class="bi bi-person-x"></i></button>
                        `;
                    }

                    htmlAgentes += `
                        <tr class="data-row">
                            <td>${item.ramal}</td>
                            <td><span style="font-weight:600">${item.nome}</span></td>
                            <td>
                                <span class="status-badge" style="background:${corStatus}">${statusTxt}</span>
                                <span class="timer-text">${tempo}</span>
                            </td>
                            <td style="font-family:'JetBrains Mono'; color:var(--hsr-cyan)">${item.chamada ? (item.chamada.phone_number || "---") : "---"}</td>
                            <td>${filaDisplay !== "---" ? `<span class="fila-badge"><i class="bi bi-funnel-fill"></i> ${filaDisplay}</span>` : '---'}</td>
                            <td style="text-align:right">
                                ${botoesAcao}
                                <span class="ping-box ${item.ping > 60 ? 'critico' : 'bom'}" style="display:inline-flex; margin-left:15px; width: 70px;">
                                    <i class="bi bi-reception-4"></i> ${item.ping}ms
                                </span>
                            </td>
                        </tr>
                    `;
                });

                if (temAgenteNoFiltro) {
                    corpo.innerHTML += `<tr class="company-divider"><td colspan="6"><i class="bi bi-chevron-right"></i> DEPARTAMENTO: ${empresa}</td></tr>`;
                    corpo.innerHTML += htmlAgentes;
                }
            });
        }

        setInterval(sincronizar, 1500);
        document.getElementById('hsr-pass').addEventListener('keypress', (e) => { if (e.key === 'Enter') validarHSR(); });
    </script>
</body>

</html>
